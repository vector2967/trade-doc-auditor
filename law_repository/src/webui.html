<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>관세법령 저장소 데모</title>
<style>
  :root { --line:#d9dde3; --muted:#6b7280; --accent:#1d4ed8; --bg:#f7f8fa; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Malgun Gothic',system-ui,sans-serif; background:var(--bg); color:#1f2430; }
  header { background:#fff; border-bottom:1px solid var(--line); padding:14px 22px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  header h1 { font-size:17px; margin:0; }
  header .sub { color:var(--muted); font-size:12.5px; }
  main { max-width:1080px; margin:0 auto; padding:18px 22px 60px; }
  .tabs { display:flex; gap:6px; margin-bottom:14px; }
  .tabs button { border:1px solid var(--line); background:#fff; padding:7px 16px; border-radius:8px; cursor:pointer; font-size:13.5px; }
  .tabs button.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  .panel { display:none; } .panel.on { display:block; }
  form { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  input, select { border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:14px; }
  input[type=text] { flex:1; min-width:240px; }
  input[type=date] { color:var(--muted); }
  button.go { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:8px 18px; cursor:pointer; font-size:14px; }
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:800px){ .cols { grid-template-columns:1fr; } }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
  .card h3 { margin:0 0 8px; font-size:13px; color:var(--muted); font-weight:600; }
  .hit { padding:8px 6px; border-top:1px solid #eef0f3; cursor:pointer; }
  .hit:first-of-type { border-top:0; }
  .hit .head { font-size:13.5px; }
  .hit .meta { font-size:11.5px; color:var(--muted); margin-top:2px; }
  .hit pre { display:none; }
  .hit.open pre { display:block; }
  pre { white-space:pre-wrap; font-family:inherit; font-size:13px; background:var(--bg); border-radius:8px; padding:10px; margin:8px 0 2px; max-height:340px; overflow:auto; }
  .tag { display:inline-block; font-size:11px; border-radius:5px; padding:1.5px 7px; margin-right:6px; background:#e8edfb; color:var(--accent); }
  .tag.warn { background:#fdeaea; color:#b91c1c; }
  .req { border-top:1px solid #eef0f3; padding:9px 4px; font-size:13.5px; }
  .req .meta { color:var(--muted); font-size:12px; margin-top:3px; }
  .note { color:var(--muted); font-size:12.5px; margin:10px 2px; }
  .spin { color:var(--muted); font-size:13px; padding:16px 4px; }
  .edge { font-size:13px; padding:5px 4px; border-top:1px solid #eef0f3; }
  .asof-badge { font-size:12px; color:#b45309; }
</style>
</head>
<body>
<header>
  <h1>관세법령 저장소</h1>
  <span class="sub">관세법·시행령·시행규칙 1,008조문 · HSK 요건 그래프 · 시점 조회 — 팀 데모</span>
</header>
<main>
  <div class="tabs">
    <button class="on" data-p="search">조문 검색</button>
    <button data-p="hsk">품목 요건 (HS)</button>
    <button data-p="art">조문 직접 조회</button>
  </div>

  <div class="panel on" id="p-search">
    <form onsubmit="doSearch();return false">
      <input type="text" id="q" placeholder="예: 물건이 상해서 돌려보내면 세금 돌려받을 수 있나?" required>
      <input type="date" id="q-asof" title="시점(비우면 현행)">
      <button class="go">검색</button>
    </form>
    <div class="note">dense = 의미검색(일상어 OK) · bm25 = 키워드검색(법률용어에 강함). 결과 클릭 시 조문 전문.</div>
    <div class="cols">
      <div class="card"><h3>dense (의미)</h3><div id="r-dense"></div></div>
      <div class="card"><h3>bm25 (키워드)</h3><div id="r-bm25"></div></div>
    </div>
  </div>

  <div class="panel" id="p-hsk">
    <form onsubmit="doHsk();return false">
      <input type="text" id="hs" placeholder="HS 코드 6자리 또는 10자리 (예: 0203291000 삼겹살)" required>
      <select id="hs-trade"><option value="">수출입 전체</option><option>수입</option><option>수출</option></select>
      <button class="go">요건 조회</button>
    </form>
    <div class="note">요건이 1건이라도 있으면 세관장확인 대상입니다. 근거 조문: 관세법 제226조 (조문 직접 조회 탭에서 "법 / 226").</div>
    <div class="card" id="r-hsk"><div class="spin">코드를 입력하세요.</div></div>
  </div>

  <div class="panel" id="p-art">
    <form onsubmit="doArt();return false">
      <select id="a-law"><option value="법">관세법</option><option value="영">시행령</option><option value="규칙">시행규칙</option></select>
      <input type="text" id="a-no" placeholder="조번호 (예: 226, 5의2)" style="max-width:160px" required>
      <input type="date" id="a-asof" title="시점(비우면 현행)">
      <button class="go">조회</button>
    </form>
    <div class="note">시점을 지정하면 그 날짜에 유효했던 버전이 나옵니다. (개정 예시: 시행령 92조를 2026-04-01 로)</div>
    <div class="card" id="r-art"><div class="spin">조문을 선택하세요.</div></div>
  </div>
</main>
<script>
const $ = id => document.getElementById(id);
document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('on'));
  b.classList.add('on'); $('p-' + b.dataset.p).classList.add('on');
});
const esc = s => (s ?? '').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
async function j(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.statusText);
  return r.json();
}

async function doSearch() {
  const q = $('q').value.trim(), asof = $('q-asof').value;
  for (const a of ['dense','bm25']) $('r-'+a).innerHTML = '<div class="spin">검색 중…</div>';
  try {
    const d = await j(`/api/search?q=${encodeURIComponent(q)}&limit=5${asof?`&as_of=${asof}`:''}`);
    for (const arm of ['dense','bm25']) {
      $('r-'+arm).innerHTML = (d[arm]||[]).map(h => `
        <div class="hit" onclick="this.classList.toggle('open')">
          <div class="head">${esc(h.head)}</div>
          <div class="meta">score ${h.score} · pk ${h.pk}</div>
          <pre>${esc(h.text)}</pre>
        </div>`).join('') || '<div class="spin">결과 없음</div>';
    }
  } catch (e) { for (const a of ['dense','bm25']) $('r-'+a).innerHTML = `<div class="spin">오류: ${esc(e.message)}</div>`; }
}

async function doHsk() {
  $('r-hsk').innerHTML = '<div class="spin">조회 중…</div>';
  try {
    const t = $('hs-trade').value;
    const d = await j(`/api/hsk?code=${encodeURIComponent($('hs').value.trim())}${t?`&trade=${encodeURIComponent(t)}`:''}`);
    const a = d.ancestors;
    const chain = [a.chapter2, a.heading4, a.hs6].filter(x => x.name).map(x => esc(x.name)).join(' › ');
    $('r-hsk').innerHTML = `
      <div style="font-size:15px"><b>${d.hsk10}</b> ${esc(d.name_ko) || '<span class="spin">(코드 미등록)</span>'}</div>
      <div class="note">${chain || ''}</div>
      <div style="margin:8px 0">${d.requirements.length
        ? '<span class="tag warn">세관장확인 대상</span>요건 ' + d.requirements.length + '건'
        : '<span class="tag">요건 없음</span>등록된 세관장확인 요건이 없습니다'}</div>
      ${d.requirements.map(q => `
        <div class="req"><span class="tag">${esc(q.trade_type)}</span><b>${esc(q.law_name)}</b>
          <div class="meta">서류: ${esc(q.document)}<br>기관: ${esc((q.agencies||[]).join(', '))}</div>
        </div>`).join('')}`;
  } catch (e) { $('r-hsk').innerHTML = `<div class="spin">오류: ${esc(e.message)}</div>`; }
}

async function doArt() {
  $('r-art').innerHTML = '<div class="spin">조회 중…</div>';
  try {
    const asof = $('a-asof').value;
    const d = await j(`/api/article?law=${encodeURIComponent($('a-law').value)}&no=${encodeURIComponent($('a-no').value.trim())}${asof?`&as_of=${asof}`:''}`);
    if (!d.found) { $('r-art').innerHTML = '<div class="spin">해당 시점에 그 조문이 없습니다. (저장소는 초기적재 시행분부터 보유)</div>'; return; }
    $('r-art').innerHTML = `
      <div style="font-size:15px"><b>${esc(d.law)}</b> ${esc(d.title)}
        ${d.is_current ? '<span class="tag">현행</span>' : '<span class="tag warn">과거 버전</span>'}
        <span class="asof-badge">유효기간 ${d.valid_from} ~ ${d.valid_to || '현재'}</span></div>
      <pre>${esc(d.content)}</pre>
      ${d.edges.length ? '<h3 style="font-size:13px;color:var(--muted);margin:12px 0 4px">위임/인용 관계</h3>' : ''}
      ${d.edges.map(e => `<div class="edge"><span class="tag">${esc(e.rel)}</span>${esc(e.label)} <span style="color:var(--muted)">(${esc(e.title||'')})</span></div>`).join('')}`;
  } catch (e) { $('r-art').innerHTML = `<div class="spin">오류: ${esc(e.message)}</div>`; }
}
</script>
</body>
</html>
